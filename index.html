<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ehem</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #counter {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>واحده واحده بقا</h1>
    <h2>Goooooo</h2>
    <button id="playBtn">yala hob</button>
    <div>عدي بقا .. <span id="counter">0</span></div>

    <audio id="myAudio" src="input.mp3"></audio>

    <script>
        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("playBtn");
        const counterEl = document.getElementById("counter");

        btn.addEventListener("click", () => {
            let count = 0;
            const maxRepeats = 1000;

            audio.play();

            audio.addEventListener("ended", function handler() {
                count++;
                counterEl.textContent = count; // تحديث الرقم على الصفحة
                if(count < maxRepeats){
                    audio.currentTime = 0;
                    audio.play();
                } else {
                    audio.removeEventListener("ended", handler);
                    alert("الحمدلله التي تتم بنعمته الصالحات");
                }
            });
        });
    </script>
</body>
</html>
