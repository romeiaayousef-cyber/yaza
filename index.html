<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ehem</title>

<style>

body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial, sans-serif;
    animation:bgMove 8s infinite alternate;
}

/* انيميشن الخلفية */
@keyframes bgMove{
    0%{background:#f0f0f0;}
    25%{background:#ffd6d6;}
    50%{background:#d6f0ff;}
    75%{background:#e5ffd6;}
    100%{background:#fff0d6;}
}

button{
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;

    animation:pulse 2s infinite;
}

/* انيميشن الزرار */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

#counter{
    font-size:28px;
    font-weight:bold;
    color:#333;
}

/* bounce للرقم */
.bounce{
    animation:bounce 0.4s;
}

@keyframes bounce{
    0%{transform:scale(1);}
    50%{transform:scale(1.5);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<h1>واحده واحده بقا</h1>
<h2>Goooooo</h2>

<button id="playBtn">yala hob</button>

<div>عدي بقا .. <span id="counter">0</span></div>

<audio id="myAudio" src="input.mp3"></audio>

<script>

const audio = document.getElementById("myAudio");
const btn = document.getElementById("playBtn");
const counterEl = document.getElementById("counter");

btn.addEventListener("click", () => {

    let count = 0;
    const maxRepeats = 1000;

    audio.play();

    audio.addEventListener("ended", function handler(){

        count++;
        counterEl.textContent = count;

        // انيميشن الرقم
        counterEl.classList.add("bounce");
        setTimeout(()=>counterEl.classList.remove("bounce"),300);

        if(count < maxRepeats){
            audio.currentTime = 0;
            audio.play();
        }else{
            audio.removeEventListener("ended", handler);
            alert("الحمدلله التي تتم بنعمته الصالحات");
        }

    });

});

</script>

</body>
</html>
